<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Toko Sepatu Keren</title>
</head>
<body>

    <h1>Toko Sepatu Keren</h1>

    <h3>Daftar Sepatu</h3>
    <ul>
        <li>Nike Air Force 1 – Rp1.200.000</li>
        <li>Adidas Samba – Rp1.100.000</li>
        <li>Converse All Star – Rp800.000</li>
        <li>Vans Old Skool – Rp900.000</li>
    </ul>

    <h3>Form Pemesanan</h3>
    <form>
        <label>Nama Pembeli:</label><br>
        <input type="text" name="nama"><br><br>

        <label>Pilih Sepatu:</label><br>
        <select name="sepatu">
            <option>Nike Air Force 1</option>
            <option>Adidas Samba</option>
            <option>Converse All Star</option>
            <option>Vans Old Skool</option>
        </select><br><br>

        <label>Ukuran:</label><br>
        <input type="number" name="ukuran" min="36" max="45"><br><br>

        <label>Jumlah:</label><br>
        <input type="number" name="jumlah" min="1"><br><br>

        <label>Alamat:</label><br>
        <textarea name="alamat" rows="4" cols="30"></textarea><br><br>

        <button type="submit">Pesan Sekarang</button>
    </form>

    <br>
    <a href="index.html">Kembali ke Beranda</a>

</body>
</html>
